# DevMind - Render Blueprint
# One-click deploy to Render!

services:
  - type: web
    name: devmind
    env: docker
    region: oregon
    plan: free
    
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: LOCAL_BACKEND_API_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

    # Auto-deploy from main branch
    autoDeploy: true
