# Render Blueprint for OpenHands Self-Hosted
# Deploy this on Render: https://render.com/deploy?repo=https://github.com/YOUR_USERNAME/openhands-self-hosted

services:
  - type: web
    name: openhands
    env: docker
    region: oregon  # Change to your preferred region
    plan: free  # Free tier - may sleep after 15 min of inactivity
    
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: LOCAL_BACKEND_API_KEY
        generateValue: true
      - key: AGENT_CANVAS_MODE
        value: full

    # Auto-deploy from main branch
    autoDeploy: true


