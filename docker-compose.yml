# DevMind - Docker Compose for local testing
version: '3.8'

services:
  devmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devmind
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - LOCAL_BACKEND_API_KEY=${LOCAL_BACKEND_API_KEY:-devmind-secret-key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
