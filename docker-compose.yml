# Docker Compose for OpenHands Self-Hosted
# Local development and testing

version: '3.8'

services:
  openhands:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openhands-canvas
    ports:
      - "8000:8000"  # Agent Canvas UI
      - "80:80"      # Nginx (optional)
      - "443:443"    # HTTPS (optional)
    environment:
      - NODE_ENV=production
      - LOCAL_BACKEND_API_KEY=${LOCAL_BACKEND_API_KEY:-your-secret-key-change-in-production}
      - AGENT_CANVAS_MODE=full
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:8000}
    volumes:
      - ./data:/app/data  # Persist data
      - ./workspace:/app/workspace  # Agent workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: ngrok for public access
  ngrok:
    image: ngrok/ngrok:latest
    container_name: openhands-ngrok
    depends_on:
      - openhands
    command: http 8000 --domain=${NGROK_DOMAIN:-}
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    profiles:
      - public

networks:
  default:
    name: openhands-network
